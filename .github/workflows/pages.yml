name: Deploy static ARPES site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Copy data
        run: |
          mkdir -p github-pages/data
          cp arpes_lit_extractor/data/elements.json github-pages/data/elements.json
          cp arpes_lit_extractor/data/articles.json github-pages/data/articles.json
          cp arpes_lit_extractor/data/search_sources.json github-pages/data/search_sources.json
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: github-pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
